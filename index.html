<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopee Feedback Analyst</title>
    <!-- Add Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="container">
        <h1>Shopee Feedback Analyst Demo</h1>
        <!-- Form để nhập URL -->
        <form id="urlForm">
            <div class="mb-3">
                <label for="urlInput" class="form-label">URL:</label>
                <input type="text" class="form-control" id="urlInput" placeholder="https://example.com/" required />
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
            <span class="text-success ms-5" id="successAlert" style="display: none">Done!</span>
        </form>
        <!-- Progress Bar -->
        <div class="progress mt-4" id="progress-container" style="display: none">
            <div id="positiveProgressBar" class="progress-bar bg-success" role="progressbar" style="width: 0%"
                aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
            </div>
            <div id="negativeProgressBar" class="progress-bar bg-danger" role="progressbar" style="width: 0%"
                aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
            </div>
        </div>
    </div>

    <!-- Link Bootstrap JS và jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
